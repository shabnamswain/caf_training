###############################################################################
# Step template - download the published tfplan artifact and apply it.
#
# Re-runs `terraform init` against the same backend so the working tree is
# fully provisioned even when the apply runs on a fresh deployment-job agent.
###############################################################################

parameters:
  - name: serviceConnection
    type: string
  - name: terraformVersion
    type: string
    default: 1.9.5
  - name: workingDir
    type: string
  - name: backendResourceGroup
    type: string
  - name: backendStorageAccount
    type: string
  - name: backendContainer
    type: string
  - name: stateKey
    type: string
  - name: planArtifactName
    type: string

steps:
  - task: DownloadPipelineArtifact@2
    displayName: 'Download tfplan artifact (${{ parameters.planArtifactName }})'
    inputs:
      artifact: ${{ parameters.planArtifactName }}
      path: ${{ parameters.workingDir }}

  - template: terraform-init.yml
    parameters:
      serviceConnection: ${{ parameters.serviceConnection }}
      terraformVersion: ${{ parameters.terraformVersion }}
      workingDir: ${{ parameters.workingDir }}
      backendResourceGroup: ${{ parameters.backendResourceGroup }}
      backendStorageAccount: ${{ parameters.backendStorageAccount }}
      backendContainer: ${{ parameters.backendContainer }}
      stateKey: ${{ parameters.stateKey }}

  - task: AzureCLI@2
    displayName: 'terraform apply tfplan'
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: bash
      scriptLocation: inlineScript
      workingDirectory: ${{ parameters.workingDir }}
      addSpnToEnvironment: true
      inlineScript: |
        set -euo pipefail
        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

        terraform apply -input=false -auto-approve tfplan
