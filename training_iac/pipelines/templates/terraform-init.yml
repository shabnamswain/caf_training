###############################################################################
# Step template - install Terraform + run `terraform init` with partial backend
# config (resource_group_name / storage_account_name / container_name / key).
###############################################################################

parameters:
  - name: serviceConnection
    type: string
  - name: terraformVersion
    type: string
    default: 1.9.5
  - name: workingDir
    type: string
  - name: backendResourceGroup
    type: string
  - name: backendStorageAccount
    type: string
  - name: backendContainer
    type: string
  - name: stateKey
    type: string

steps:
  - task: TerraformInstaller@1
    displayName: 'Install Terraform ${{ parameters.terraformVersion }}'
    inputs:
      terraformVersion: ${{ parameters.terraformVersion }}

  - task: AzureCLI@2
    displayName: 'terraform init (backend=${{ parameters.stateKey }})'
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: bash
      scriptLocation: inlineScript
      workingDirectory: ${{ parameters.workingDir }}
      addSpnToEnvironment: true
      inlineScript: |
        set -euo pipefail
        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

        terraform init -input=false -reconfigure \
          -backend-config="resource_group_name=${{ parameters.backendResourceGroup }}" \
          -backend-config="storage_account_name=${{ parameters.backendStorageAccount }}" \
          -backend-config="container_name=${{ parameters.backendContainer }}" \
          -backend-config="key=${{ parameters.stateKey }}"
